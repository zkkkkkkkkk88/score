<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>世界杯赛事雷达</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <video class="field-video-bg" autoplay muted loop playsinline preload="metadata" aria-hidden="true">
      <source src="./assets/football-field-bg.mp4" type="video/mp4" />
    </video>
    <div class="field-video-overlay" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="top-nav" aria-label="仪表盘导航">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p>世界杯情报台</p>
            <h1>世界杯赛事雷达</h1>
          </div>
        </div>

        <div class="nav-stats">
          <span id="matchCount">0 场赛事</span>
          <span id="refreshTime">等待数据</span>
          <span class="live-pill">实时</span>
        </div>
      </header>

      <nav class="view-nav" aria-label="页面切换">
        <button class="view-tab is-active" type="button" data-view-button="overview">总览</button>
        <button class="view-tab" type="button" data-view-button="analysis">赛事分析</button>
        <button class="view-tab" type="button" data-view-button="plans">购买方案</button>
        <button class="view-tab" type="button" data-view-button="review">命中复盘</button>
      </nav>

      <section class="page-view is-active" data-view="overview" aria-label="赛事总览">
        <section class="focus-strip-panel" aria-label="今日重点赛事">
          <div class="section-heading">
            <p>今日重点</p>
            <h2>关键比赛</h2>
          </div>
          <div id="focusStrip" class="focus-strip" aria-live="polite"></div>
        </section>

        <section class="overview-grid" aria-label="总览工作台">
          <article class="review-panel compact-panel">
            <div class="section-heading">
              <p>自动复盘</p>
              <h2>每日方案汇总</h2>
            </div>
            <div id="dailySummary" class="daily-summary"></div>
          </article>

          <article class="tomorrow-panel compact-panel">
            <div class="section-heading">
              <p>明日准备</p>
              <h2>明日预选池</h2>
            </div>
            <div id="tomorrowPool" class="tomorrow-pool"></div>
          </article>
        </section>
      </section>

      <section class="page-view" data-view="analysis" aria-label="赛事分析">
        <div class="analysis-layout">
          <aside class="match-rail" aria-label="近几天赛事">
            <div class="section-heading">
              <p>赛程看板</p>
              <h2>近几天竞猜赛程</h2>
            </div>

            <div class="filter-tabs" role="tablist" aria-label="日期筛选">
              <button class="tab is-active" type="button" data-filter="all">全部</button>
              <button class="tab" type="button" data-filter="today">今日</button>
              <button class="tab" type="button" data-filter="tomorrow">明日</button>
            </div>

            <div id="matchList" class="match-list" aria-live="polite"></div>
          </aside>

          <section class="analysis-panel" aria-label="选中赛事分析">
            <div id="matchAnalysis"></div>
          </section>
        </div>
      </section>

      <section class="page-view" data-view="plans" aria-label="购买方案">
        <aside class="parlay-panel plans-workspace" aria-label="每日购买方案中心">
          <div class="section-heading">
            <p>购买建议</p>
            <h2>购买方案</h2>
          </div>
          <div id="parlayList" class="parlay-list"></div>
        </aside>
      </section>

      <section class="page-view" data-view="review" aria-label="命中复盘">
        <article class="review-panel review-workspace">
          <div class="section-heading">
            <p>结果追踪</p>
            <h2>今日命中追踪</h2>
          </div>
          <div id="hitTracker" class="hit-tracker"></div>
        </article>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
